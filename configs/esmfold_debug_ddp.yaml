# ESMFold Debug Config - DeepSpeed Zero-1 for Multi-GPU
# SOLUTION: Use DeepSpeed Zero-1 instead of DDP/FSDP (which hang)
# Both DDP and FSDP hang due to gradient sync issues with frozen ESM trunk
# DeepSpeed Zero-1 handles this correctly

experiment: esmfold_debug_deepspeed
description: "Multi-GPU DeepSpeed Zero-1 debug with aggressive cropping"

# Data settings - use sample data
data:
  max_length: 512
  crop_size: 128  # Aggressive cropping for memory
  date_cutoff: "2021-09-30"
  use_sample_data: true

# Linker configuration
linker:
  sequence: "GGGGGGGGGGGGGGGGGGGGGGGGG"
  use_chain_break_token: true

# Model settings
model:
  freeze_esm_trunk: true
  chunk_size: 64

# Training settings
batch_size: 1
effective_batch_size: 4
gradient_accumulation_steps: 4

learning_rate: 1.0e-5
min_learning_rate: 1.0e-7
weight_decay: 0.01
grad_clip: 0.5

max_epochs: 2
warmup_epochs: 1
early_stopping_patience: 5

# Use DeepSpeed Zero-1 (use_dp: true triggers DeepSpeed in the training script)
# DDP/FSDP hang with frozen ESM trunk parameters
use_fsdp: false
use_dp: true
precision: 32

# Optimization
optimizer: adamw
scheduler: cosine_with_warmup

# Data loading
num_workers: 2
pin_memory: true

# Logging
log_every_n_steps: 1
val_check_interval: 1.0
save_every_n_epochs: 1

# Debug settings
limit_train_batches: 5
limit_val_batches: 2
max_steps: 10

# Wandb logging
wandb:
  project: "ddi-experiment"
  entity: null
  tags:
    - esmfold
    - debug
    - ddp
