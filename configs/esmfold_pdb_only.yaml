# ESMFold Linker Trick - PDB Only
# Fine-tune pretrained ESMFold on PDB monomers + multimers
# Uses linker trick to enable multimer prediction

experiment: esmfold_pdb_only
description: "Fine-tune ESMFold with linker trick on PDB data only"

# This experiment should be fast because:
# - Starting from pretrained ESMFold checkpoint
# - Only fine-tuning, not training from scratch
# - ESMFold is already a single-sequence model (no MSA needed)

# Data settings
data:
  max_length: 1024
  crop_size: 512  # Full size with FSDP + bf16
  date_cutoff: "2021-09-30"

# Linker configuration
linker:
  sequence: "GGGGGGGGGGGGGGGGGGGGGGGGG"  # 25 glycines
  use_chain_break_token: true

# Model settings
model:
  # Whether to freeze the ESM language model trunk
  # Setting to true = only train folding module (faster, less GPU memory)
  # Setting to false = fine-tune entire model (slower, better results)
  freeze_esm_trunk: true

  # ESMFold specific
  chunk_size: 128  # For memory efficiency

# Training settings - lower LR for fine-tuning pretrained model
batch_size: 1
effective_batch_size: 4
gradient_accumulation_steps: 4

learning_rate: 1.0e-5  # Low LR for fine-tuning
min_learning_rate: 1.0e-7
weight_decay: 0.01
grad_clip: 0.5

max_epochs: 30  # Fewer epochs needed for fine-tuning
warmup_epochs: 2
early_stopping_patience: 5

# Mixed precision
use_amp: true
precision: bf16

# Optimization
optimizer: adamw
scheduler: cosine_with_warmup

# Data loading
num_workers: 4
pin_memory: true

# Logging
log_every_n_steps: 50
val_check_interval: 500
save_every_n_epochs: 2

# Wandb logging
wandb:
  project: "ddi-experiment"
  entity: null
  tags:
    - esmfold
    - linker-trick
    - pdb-only
    - fine-tune
