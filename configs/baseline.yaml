# Baseline Configuration
# Training on PDB multimers only

experiment: baseline
description: "Baseline training on PDB multimers without DDI data"

# Data settings
data:
  max_length: 512
  crop_size: 256
  date_cutoff: "2021-09-30"

# Model settings (overridden per model)
model:
  embed_dim: 256
  num_layers: 12
  num_heads: 8

# Training settings
batch_size: 1
effective_batch_size: 8  # With gradient accumulation
gradient_accumulation_steps: 8

learning_rate: 1.0e-4
min_learning_rate: 1.0e-6
weight_decay: 0.01
grad_clip: 1.0

max_epochs: 100
warmup_epochs: 5
early_stopping_patience: 10

# Mixed precision
use_amp: true
precision: bf16

# Optimization
optimizer: adamw
scheduler: cosine_with_warmup

# Data loading
num_workers: 4
pin_memory: true

# Logging
log_every_n_steps: 100
val_check_interval: 1000
save_every_n_epochs: 5

# Wandb logging
wandb:
  project: "ddi-experiment"
  entity: null  # Set your wandb entity
  tags:
    - baseline
    - pdb-only
