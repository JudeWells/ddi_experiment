# Joint Training Configuration
# Mixed DDI + PDB data with weighted sampling

experiment: joint
description: "Joint training on DDI and PDB data with weighted sampling"

# Data settings
data:
  max_length: 512
  crop_size: 256
  date_cutoff: "2021-09-30"
  plddt_threshold: 70

# Sampling weights
# Oversample PDB data since it's smaller
pdb_weight: 2.0  # PDB samples are 2x more likely to be selected
ddi_weight: 1.0

# Curriculum learning (optional)
curriculum:
  enabled: false
  # Start with more DDI, gradually increase PDB ratio
  initial_pdb_weight: 1.0
  final_pdb_weight: 3.0
  warmup_epochs: 10

# Model settings
model:
  embed_dim: 256
  num_layers: 12
  num_heads: 8

# Training settings
batch_size: 1
effective_batch_size: 8
gradient_accumulation_steps: 8

learning_rate: 1.0e-4
min_learning_rate: 1.0e-6
weight_decay: 0.01
grad_clip: 1.0

max_epochs: 100
warmup_epochs: 5
early_stopping_patience: 10

# Mixed precision
use_amp: true
precision: bf16

# Optimization
optimizer: adamw
scheduler: cosine_with_warmup

# Data loading
num_workers: 8
pin_memory: true

# Logging
log_every_n_steps: 100
val_check_interval: 1000
save_every_n_epochs: 5

# Track data source in metrics
track_data_source: true

# Wandb logging
wandb:
  project: "ddi-experiment"
  entity: null
  tags:
    - joint-training
    - mixed-data
